<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }} — Thrive Translate</title>
  <style>
    :root {
      --navy: #0F2D4A;
      --coral: #FF7276;
      --orange: #FFAA4D;
      --bg: #F4F6FA;
      --muted: #5b6b80;
      --rule: rgba(15, 45, 74, 0.1);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--navy);
      line-height: 1.65;
    }
    header {
      background: linear-gradient(135deg, var(--orange), var(--coral));
      padding: 28px 24px;
    }
    header .inner {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    header a {
      color: white;
      text-decoration: none;
      font-weight: 800;
      font-size: 14px;
      opacity: 0.9;
    }
    header a:hover { opacity: 1; }
    header .brand {
      font-weight: 900;
      font-size: 16px;
      color: white;
      flex: 1;
    }
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 40px 24px 96px;
    }
    h1 {
      font-size: 30px;
      font-weight: 900;
      letter-spacing: -0.02em;
      margin: 0 0 8px;
    }
    h2 {
      font-size: 19px;
      font-weight: 800;
      margin: 36px 0 8px;
      padding-top: 16px;
      border-top: 1px solid var(--rule);
    }
    h3 {
      font-size: 15px;
      font-weight: 800;
      margin: 24px 0 6px;
      color: var(--navy);
    }
    p, ul, ol { font-size: 15px; }
    a { color: var(--coral); }
    a:hover { text-decoration: underline; }
    table {
      border-collapse: collapse;
      width: 100%;
      margin: 16px 0;
      font-size: 14px;
    }
    th, td {
      border: 1px solid var(--rule);
      padding: 8px 12px;
      text-align: left;
      vertical-align: top;
    }
    th {
      background: rgba(15, 45, 74, 0.04);
      font-weight: 800;
    }
    code {
      font-family: "SF Mono", Menlo, monospace;
      font-size: 13px;
      background: rgba(15, 45, 74, 0.06);
      padding: 1px 5px;
      border-radius: 4px;
    }
    hr {
      border: 0;
      border-top: 1px solid var(--rule);
      margin: 32px 0;
    }
    .meta {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 32px;
    }
    footer {
      max-width: 720px;
      margin: 40px auto 0;
      padding: 24px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      border-top: 1px solid var(--rule);
    }
    @media (max-width: 540px) {
      h1 { font-size: 24px; }
      h2 { font-size: 17px; }
      main { padding: 24px 18px 64px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="inner">
      <span class="brand">Thrive Translate</span>
      <a href="/">Home</a>
      <a href="PRIVACY.html">Privacy</a>
      <a href="TERMS.html">Terms</a>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    ThriveClinic Translate · Toronto, ON · Canada
  </footer>
</body>
</html>
